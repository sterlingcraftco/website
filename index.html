<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sterling-Craft Co.</title>
  <!-- Google Fonts: Montaga -->
  <link href="https://fonts.googleapis.com/css2?family=Montaga&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React and ReactDOM CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <!-- Babel CDN for JSX transpilation -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>
</head>
<body class="antialiased">
  <div id="root">
    <p>Loading...</p> <!-- Fallback content if React fails to load -->
  </div>
  <script type="text/babel">
    // Check if React and ReactDOM are loaded
    if (!window.React || !window.ReactDOM) {
      console.error("React or ReactDOM failed to load. Check CDN availability or network connection.");
    }

    // Navbar Component with Logo
    const Navbar = () => (
      <nav className="bg-[#4D331F] text-white p-4 sticky top-0 z-10 shadow-md">
        <div className="container mx-auto flex justify-between items-center">
          <div className="flex items-center space-x-2">
            <img src="logo.png" alt="Sterling-Craft Logo" className="h-10" />
            <h1 className="text-2xl font-['Montaga'] uppercase tracking-wide text-[#883D1A]"></h1>
          </div>
          <div className="space-x-4 font-['Montaga']">
            <a href="#home" className="hover:text-[#883D1A] transition-colors">Home</a>
            <a href="#about" className="hover:text-[#883D1A] transition-colors">About</a>
            <a href="#services" className="hover:text-[#883D1A] transition-colors">Services</a>
            <a href="#contact" className="hover:text-[#883D1A] transition-colors">Contact</a>
          </div>
        </div>
      </nav>
    );

    // Hero Section
    const Hero = () => (
      <section id="home" className="bg-gradient-to-r from-[#4D331F] to-[#883D1A] text-white py-20">
        <div className="container mx-auto text-center">
          <h2 className="text-4xl md:text-5xl font-['Montaga'] uppercase tracking-wide mb-4">Empowering Your Business for an AI-Assisted Future</h2>
          <p className="text-lg md:text-xl mb-6 font-serif">Sterling-Craft Co. equips businesses with cutting-edge strategies and tools to thrive in tomorrow's world.</p>
          <a href="#contact" className="bg-[#883D1A] text-white px-6 py-3 rounded-full font-['Montaga'] uppercase tracking-wide hover:bg-[#4D331F] transition-colors">Get Started</a>
        </div>
      </section>
    );

    // About Section
    const About = () => (
      <section id="about" className="py-16 bg-amber-50"> {/* Light vintage paper feel */}
        <div className="container mx-auto px-4">
          <h2 className="text-3xl font-['Montaga'] uppercase tracking-wide text-[#883D1A] text-center mb-8">About Sterling-Craft Co.</h2>
          <p className="text-lg text-[#4D331F] max-w-3xl mx-auto font-serif">
            At Sterling-Craft Co., we believe in preparing businesses for the future. Our mission is to provide innovative business strategies and AI-driven tools that empower companies to stay ahead in an ever-evolving, AI-assisted world. With our expertise, we help you navigate challenges and seize opportunities in the digital age.
          </p>
        </div>
      </section>
    );

    // Services Section
    const Services = () => (
      <section id="services" className="py-16 bg-white">
        <div className="container mx-auto px-4">
          <h2 className="text-3xl font-['Montaga'] uppercase tracking-wide text-[#883D1A] text-center mb-8">Our Services</h2>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div className="bg-amber-50 p-6 rounded-lg shadow-md border border-[#883D1A]/20">
              <h3 className="text-xl font-['Montaga'] uppercase tracking-wide text-[#883D1A] mb-4">AI-Driven Strategy</h3>
              <p className="text-[#4D331F] font-serif">Crafting tailored business strategies that leverage AI to optimize operations and drive growth.</p>
            </div>
            <div className="bg-amber-50 p-6 rounded-lg shadow-md border border-[#883D1A]/20">
              <h3 className="text-xl font-['Montaga'] uppercase tracking-wide text-[#883D1A] mb-4">Technology Integration</h3>
              <p className="text-[#4D331F] font-serif">Seamlessly integrating AI tools to enhance efficiency and innovation in your business.</p>
            </div>
            <div className="bg-amber-50 p-6 rounded-lg shadow-md border border-[#883D1A]/20">
              <h3 className="text-xl font-['Montaga'] uppercase tracking-wide text-[#883D1A] mb-4">Consulting & Training</h3>
              <p className="text-[#4D331F] font-serif">Expert guidance and training to help your team adapt to AI-driven workflows.</p>
            </div>
          </div>
        </div>
      </section>
    );

    // Contact Section
    const Contact = () => (
      <section id="contact" className="py-16 bg-amber-50">
        <div className="container mx-auto px-4 text-center">
          <h2 className="text-3xl font-['Montaga'] uppercase tracking-wide text-[#883D1A] mb-8">Get in Touch</h2>
          <p className="text-lg text-[#4D331F] mb-6 font-serif">Ready to transform your business? Contact us today to explore how we can help you thrive in an AI-assisted world.</p>
          <div className="max-w-md mx-auto">
            <input type="text" placeholder="Your Name" className="w-full p-3 mb-4 border border-[#883D1A]/20 rounded-lg bg-white" />
            <input type="email" placeholder="Your Email" className="w-full p-3 mb-4 border border-[#883D1A]/20 rounded-lg bg-white" />
            <textarea placeholder="Your Message" className="w-full p-3 mb-4 border border-[#883D1A]/20 rounded-lg bg-white" rows="4"></textarea>
            <button className="bg-[#883D1A] text-white px-6 py-3 rounded-lg font-['Montaga'] uppercase tracking-wide hover:bg-[#4D331F] transition-colors">Send Message</button>
          </div>
        </div>
      </section>
    );

    // Footer
    const Footer = () => (
      <footer className="bg-[#4D331F] text-white py-6">
        <div className="container mx-auto text-center font-['Montaga']">
          <p>&copy; 2025 Sterling-Craft Co. All rights reserved.</p>
          <p className="mt-2">Visit us at <a href="https://sterling-craft.co" className="underline hover:text-[#883D1A] transition-colors">sterling-craft.co</a></p>
        </div>
      </footer>
    );

    // Main App Component
    const App = () => (
      <div className="font-serif"> {/* Fallback serif font for body text */}
        <Navbar />
        <Hero />
        <About />
        <Services />
        <Contact />
        <Footer />
      </div>
    );

    // Render the App
    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (error) {
      console.error("Failed to render React app:", error);
    }
  </script>
</body>
</html>
